  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">ระบบคลังหนังสือ</a>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

    <div class="mt-3">
      <div class="card">
        <div class="card-header">
          <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            เพิ่มหนังสือ
          </button>
        </div>

        <div
          class="modal fade"
          id="exampleModal"
          tabindex="-1"
          aria-labelledby="exampleModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <form action="" onsubmit="add_books(event)">
                <div class="modal-header">
                  <h1 class="modal-title fs-5" id="exampleModalLabel">
                    Modal title
                  </h1>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>
                <div class="modal-body">
                  <div class="mb-3">
                    <label for="title" class="form-label">ชื่อหนังสือ</label>
                    <input
                      type="text"
                      class="form-control"
                      id="title"
                      placeholder="NodeJS"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="author" class="form-label">ผู้แต่ง</label>
                    <input
                      type="text"
                      class="form-control"
                      id="author"
                      placeholder="สมชาย"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="published_year" class="form-label"
                      >ปีที่พิมพ์</label
                    >
                    <input
                      type="number"
                      class="form-control"
                      id="published_year"
                      placeholder="2023"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="price" class="form-label">ราคา</label>
                    <input
                      type="number"
                      class="form-control"
                      id="price"
                      placeholder="300"
                    />
                  </div>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    ปิด
                  </button>
                  <button type="submit" class="btn btn-primary">
                    เพิ่มหนังสือ
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="card-body">
          <table class="table">
            <thead>
              <tr>
                <th scope="col"># ID</th>
                <th scope="col">ชื่อหนังสือ</th>
                <th scope="col">ชื่อผู้แต่ง</th>
                <th scope="col">ปีที่พิมพ์</th>

                <th scope="col"></th>
              </tr>

            <tbody id = "table_detail">
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

              'Authorization' : `Bearer ${token}`
